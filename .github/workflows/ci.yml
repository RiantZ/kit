name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            name: Linux (GCC)
            preset: linux
            build_dir: _Build_lnx
            build_config_flag: ""
            test_config_flag: ""
          - os: macos-14
            name: macOS (AppleClang)
            preset: macos
            build_dir: _Build_mac
            build_config_flag: ""
            test_config_flag: ""
          - os: windows-2022
            name: Windows (MSVC)
            preset: windows
            build_dir: _Build_wnd
            build_config_flag: "--config Release"
            test_config_flag: "-C Release"

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install CMake 4.x
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "~4.0"

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build ${{ matrix.build_dir }} ${{ matrix.build_config_flag }}

      - name: Test
        run: ctest --test-dir ${{ matrix.build_dir }} ${{ matrix.test_config_flag }} --output-on-failure

  format:
    name: clang-format check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # clang-format output drifts between major versions. Pin to 22 to match
      # the version developers use locally (Homebrew clang-format); the runner's
      # default is v18, which reports spurious violations.
      - name: Install clang-format 22
        run: |
          wget -q https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22
          sudo apt-get install -y clang-format-22
          # /usr/local/bin precedes /usr/bin in PATH, so this wins over the
          # runner's default clang-format.
          sudo ln -sf /usr/bin/clang-format-22 /usr/local/bin/clang-format
          clang-format --version

      - name: Check formatting
        run: python scripts/code_format.py --check --all
