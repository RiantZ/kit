name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            name: Linux (GCC)
            preset: linux
            build_dir: _Build_lnx
          - os: macos-14
            name: macOS (AppleClang)
            preset: macos
            build_dir: _Build_mac
          - os: windows-2022
            name: Windows (MSVC)
            preset: windows
            build_dir: _Build_wnd

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install CMake 4.x
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "~4.0"

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build ${{ matrix.build_dir }} --config Release

      - name: Test
        run: ctest --test-dir ${{ matrix.build_dir }} --config Release --output-on-failure
